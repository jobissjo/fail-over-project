<div class="space-y-8 pb-12">
  
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight">User Media Requests</h1>
      <p class="mt-1 text-sm text-white/40">Review and manage incoming library addition requests</p>
    </div>
    <div class="rounded-2xl bg-white/5 px-4 py-2 border border-white/5 backdrop-blur-xl">
      <div class="text-[10px] font-bold uppercase tracking-widest text-white/40">Active Queue</div>
      <div class="text-xl font-bold">{{ requests().length }} Total</div>
    </div>
  </div>

  <div class="rounded-[2.5rem] border border-white/5 bg-[#12121a]/30 p-8 backdrop-blur-xl overflow-hidden">
    
    <!-- Table Mockup with custom rows -->
    <div class="space-y-4">
      <div *ngIf="loading()" class="flex h-32 items-center justify-center">
        <div class="h-8 w-8 animate-spin rounded-full border-2 border-amber-500/20 border-t-amber-500"></div>
      </div>

      <div *ngIf="!loading() && requests().length === 0" class="py-20 text-center opacity-30">
        <div class="text-4xl mb-4">📭</div>
        <p class="text-sm font-bold uppercase tracking-widest">No pending requests</p>
      </div>

      <div 
        *ngFor="let req of requests()"
        class="group relative overflow-hidden rounded-3xl border border-white/5 bg-white/5 p-6 transition-all hover:bg-white/10"
        [class.ring-1]="editingRequest() === req.id"
        [class.ring-amber-500/50]="editingRequest() === req.id"
      >
        <div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3">
              <span class="text-[10px] font-bold uppercase tracking-widest text-white/20">Request #{{ req.id }}</span>
              <div 
                class="rounded-lg px-3 py-1 text-[8px] font-black uppercase tracking-[0.2em]"
                [ngClass]="getStatusClass(req.status)"
              >
                {{ req.status }}
              </div>
            </div>
            <h3 class="mt-2 text-xl font-bold text-white">{{ req.title }}</h3>
            <p class="mt-2 text-sm text-white/40 italic leading-relaxed">
              "{{ req.description }}"
            </p>
          </div>

          <div class="flex shrink-0 flex-col gap-3 lg:items-end">
            <!-- Normal Actions -->
            <div class="flex items-center gap-2" *ngIf="editingRequest() !== req.id">
              <button 
                (click)="startEdit(req)"
                class="rounded-xl bg-white/5 px-4 py-2 text-xs font-bold hover:bg-white/10 transition-all"
              >
                Change Status
              </button>
            </div>

            <!-- Edit Actions -->
            <div class="flex flex-col gap-4 w-full sm:w-80" *ngIf="editingRequest() === req.id">
              <textarea 
                [(ngModel)]="adminNote"
                class="w-full rounded-2xl bg-black/40 border border-white/5 px-4 py-3 text-xs outline-none focus:ring-2 focus:ring-amber-500/40"
                placeholder="Add an admin note..."
              ></textarea>
              <div class="flex flex-wrap gap-2">
                <button 
                  (click)="updateStatus(req.id, 'accepted')"
                  class="flex-1 rounded-xl bg-blue-500/20 px-3 py-2 text-[10px] font-bold text-blue-400 hover:bg-blue-500 hover:text-white transition-all"
                >
                  Accept
                </button>
                <button 
                  (click)="updateStatus(req.id, 'resolved')"
                  class="flex-1 rounded-xl bg-green-500/20 px-3 py-2 text-[10px] font-bold text-green-400 hover:bg-green-500 hover:text-white transition-all"
                >
                  Resolve
                </button>
                <button 
                  (click)="updateStatus(req.id, 'rejected')"
                  class="flex-1 rounded-xl bg-red-500/20 px-3 py-2 text-[10px] font-bold text-red-400 hover:bg-red-500 hover:text-white transition-all"
                >
                  Reject
                </button>
                <button 
                  (click)="editingRequest.set(null)"
                  class="flex-1 rounded-xl bg-white/5 px-3 py-2 text-[10px] font-bold text-white/40 hover:bg-white/10 transition-all"
                >
                  Cancel
                </button>
              </div>
            </div>

            <div class="text-[10px] text-white/20 font-medium italic" *ngIf="req.admin_note && editingRequest() !== req.id">
              Note: {{ req.admin_note }}
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>
