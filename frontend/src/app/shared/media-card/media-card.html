<div 
  class="group relative overflow-hidden rounded-3xl border border-[var(--border-color)] bg-[var(--bg-card)] backdrop-blur-xl transition-all hover:border-violet-500/50 hover:bg-[var(--bg-input)]"
  [class.p-3]="compact"
  [class.p-4]="!compact"
  (click)="onCardClick()"
>
  <!-- Poster Image -->
  <div class="relative aspect-[2/3] overflow-hidden rounded-2xl bg-[var(--bg-input)]">
    <img 
      [src]="media?.image || 'https://via.placeholder.com/300x450?text=No+Image'" 
      [alt]="media?.title"
      class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110"
    >
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 transition-opacity group-hover:opacity-100"></div>
    
    <!-- Status Badge -->
    <div 
      class="absolute right-3 top-3 inline-flex items-center rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider"
      [ngClass]="statusClass"
    >
      {{ statusLabel }}
    </div>
  </div>

  <!-- Content -->
  <div class="mt-4">
    <h3 class="line-clamp-1 text-sm font-semibold text-[var(--text-primary)] group-hover:text-violet-400">
      {{ media?.title }}
    </h3>
    
    <div class="mt-2 flex items-center justify-between text-xs text-[var(--text-muted)]">
      <span>{{ media?.media_type }}</span>
      <span *ngIf="media?.total_series > 0">{{ media?.total_series }} Units</span>
    </div>

    <!-- Progress Bar -->
    <div class="mt-4" *ngIf="progress">
      <div class="flex items-center justify-between text-[10px] mb-1.5 uppercase tracking-widest text-[var(--text-muted)]">
        <span>Progress</span>
        <span>{{ progressPercentage }}%</span>
      </div>
      <div class="h-1.5 w-full overflow-hidden rounded-full bg-[var(--bg-input)]">
        <div 
          class="h-full bg-gradient-to-r from-violet-600 to-fuchsia-500 transition-all duration-1000"
          [style.width.%]="progressPercentage"
        ></div>
      </div>
    </div>
  </div>

  <!-- Quick Action -->
  <button 
    class="absolute bottom-4 right-4 h-8 w-8 scale-0 items-center justify-center rounded-xl bg-violet-600 text-white shadow-xl transition-all group-hover:scale-100 hover:bg-violet-500"
    (click)="$event.stopPropagation(); updateProgress.emit(media)"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
  </button>
</div>
